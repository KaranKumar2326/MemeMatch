name: Build Android APK

on:
  # APK only needs rebuilding when you add new native Capacitor plugins.
  # Web/UI updates are handled automatically via Firebase Hosting OTA (deploy-ota.yml).
  workflow_dispatch: # Manual trigger only — run from the Actions tab when needed

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java 17 (required by Android Gradle)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 4. Install Node dependencies
      - name: Install dependencies
        run: npm ci

      # 5. Build the Vite frontend (produces dist/)
      - name: Build web assets
        run: npx vite build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # 6. Sync web assets into Android project
      # Use local binary directly to avoid npx version resolution issues
      - name: Sync Capacitor Android
        run: ./node_modules/.bin/cap sync android

      # 7. Make gradlew executable
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # 8. Build the debug APK
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      # 9. Upload APK as a downloadable artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MemeMatch-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
