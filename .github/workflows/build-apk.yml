name: Build Android APK

on:
  # APK only needs rebuilding when you add new native Capacitor plugins.
  # Web/UI updates are handled automatically via GitHub Pages OTA (deploy-ota.yml).
  workflow_dispatch: # Manual trigger only — run from the Actions tab when needed

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java 21 — capture output path for reliable Gradle config
      - name: Set up JDK 21
        id: setup-java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Force Gradle to use the exact Java 21 we just installed
      # Writing to ~/.gradle/gradle.properties (Gradle user home) is the most
      # reliable way — avoids CRLF issues in project gradle.properties
      - name: Force Gradle to use Java 21
        run: |
          mkdir -p $HOME/.gradle
          echo "org.gradle.java.home=${{ steps.setup-java.outputs.path }}" > $HOME/.gradle/gradle.properties
          echo "Gradle will use Java at: ${{ steps.setup-java.outputs.path }}"
          ${{ steps.setup-java.outputs.path }}/bin/java -version

      # 4. Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 5. Install Node dependencies
      - name: Install dependencies
        run: npm ci

      # 6. Build the Vite frontend (produces dist/)
      - name: Build web assets
        run: npx vite build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # 7. Sync web assets into Android project
      - name: Sync Capacitor Android
        run: ./node_modules/.bin/cap sync android

      # 8. Make gradlew executable
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # 9. Build the debug APK
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon
        env:
          JAVA_HOME: ${{ steps.setup-java.outputs.path }}

      # 10. Upload APK as a downloadable artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MemeMatch-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
